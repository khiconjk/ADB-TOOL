name: Build Root ADB Enabler APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - "**/*.java"
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle"
      - "**/*.gradle.kts"
      - "**/settings.gradle"
      - "**/settings.gradle.kts"
      - "**/AndroidManifest.xml"
      - "**/src/**"
      - "**/app/**"
      - "**/gradle/**"
      - "**/gradlew"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle fallback 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Locate Android project
        id: locate
        shell: bash
        run: |
          set -e

          echo "===== REPO ROOT ====="
          pwd
          ls -la

          SETTINGS_FILE="$(find . -maxdepth 5 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: Không tìm thấy settings.gradle hoặc settings.gradle.kts"
            find . -maxdepth 6 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Found settings file: $SETTINGS_FILE"
          echo "Project dir: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Show source files
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}"

          echo "===== PROJECT DIR ====="
          pwd
          ls -la

          echo
          echo "===== GRADLE FILES ====="
          find . -maxdepth 6 \( \
            -name 'gradlew' -o \
            -name 'gradlew.bat' -o \
            -name 'build.gradle' -o \
            -name 'settings.gradle' -o \
            -name 'gradle-wrapper.properties' \
          \) -print | sort

          echo
          echo "===== JAVA / XML FILES ====="
          find app/src -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" \) -print | sort || true

          echo
          echo "===== AdbCommands.java ====="
          find app/src -type f -name "AdbCommands.java" -print -exec sed -n '1,320p' {} \; || true

          echo
          echo "===== MainActivity.java ====="
          find app/src -type f -name "MainActivity.java" -print -exec sed -n '1,360p' {} \; || true

          echo
          echo "===== AndroidManifest.xml ====="
          find app/src -type f -name "AndroidManifest.xml" -print -exec sed -n '1,240p' {} \; || true

      - name: Build debug APK
        id: build_apk
        shell: bash
        run: |
          set +e
          cd "${{ steps.locate.outputs.project_dir }}"

          rm -f build.log build-stacktrace.log

          if [ -f "./gradlew" ]; then
            echo "Using local Gradle Wrapper" | tee -a build.log
            chmod +x ./gradlew
            GRADLE_CMD="./gradlew"
          else
            echo "WARNING: ./gradlew not found" | tee -a build.log
            echo "Using GitHub Actions Gradle fallback 8.9" | tee -a build.log
            GRADLE_CMD="gradle"
          fi

          $GRADLE_CMD --version | tee -a build.log

          echo
          echo "===== NORMAL BUILD, EASY ERROR LOG =====" | tee -a build.log
          $GRADLE_CMD clean assembleDebug \
            --no-daemon \
            --console=plain \
            --warning-mode all \
            2>&1 | tee -a build.log

          STATUS=${PIPESTATUS[0]}

          if [ "$STATUS" -ne 0 ]; then
            echo
            echo "===== STACKTRACE BUILD AFTER FAILURE =====" | tee -a build-stacktrace.log
            $GRADLE_CMD assembleDebug \
              --no-daemon \
              --console=plain \
              --stacktrace \
              --warning-mode all \
              2>&1 | tee -a build-stacktrace.log
          fi

          exit "$STATUS"

      - name: Show real errors if build failed
        if: failure()
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}" || exit 0

          echo "===== BUILD LOG FILES ====="
          ls -lh build.log build-stacktrace.log 2>/dev/null || true

          echo
          echo "===== REAL ERROR FROM build.log ====="
          grep -nEi \
            "FAILURE:|What went wrong|Execution failed|^> Task .*FAILED|error:|ERROR:|Caused by:|cannot find symbol|not found|Android resource linking failed|Manifest merger failed|AAPT|Duplicate class|compileDebugJavaWithJavac|parseDebugLocalResources|mergeDebugResources|processDebugMainManifest" \
            build.log build-stacktrace.log 2>/dev/null || true

          echo
          echo "===== LAST 700 LINES build.log ====="
          tail -n 700 build.log || true

          echo
          echo "===== LAST 700 LINES build-stacktrace.log ====="
          tail -n 700 build-stacktrace.log || true

          echo
          echo "===== BUILD REPORTS ====="
          find . -type f \( -path "*/build/reports/*" -o -path "*/build/outputs/logs/*" \) -print -exec sed -n '1,220p' {} \; || true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ steps.locate.outputs.project_dir }}/build.log
            ${{ steps.locate.outputs.project_dir }}/build-stacktrace.log
            ${{ steps.locate.outputs.project_dir }}/app/build/reports/**
            ${{ steps.locate.outputs.project_dir }}/app/build/outputs/logs/**
          if-no-files-found: warn

      - name: List APK outputs
        if: always()
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}"
          echo "===== APK OUTPUTS ====="
          find . -type f -name "*.apk" -print -exec ls -lh {} \; || true

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RootAdbEnabler-debug-apk
          path: |
            ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.locate.outputs.project_dir }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
