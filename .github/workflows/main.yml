name: Build Root ADB Enabler APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - "**/*.java"
      - "**/*.kt"
      - "**/*.xml"
      - "**/*.gradle"
      - "**/*.gradle.kts"
      - "**/settings.gradle"
      - "**/settings.gradle.kts"
      - "**/AndroidManifest.xml"
      - "**/src/**"
      - "**/app/**"
      - "**/gradle/**"
      - "**/gradlew"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle fallback 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Locate Android project
        id: locate
        shell: bash
        run: |
          set -e

          echo "===== REPO ROOT ====="
          pwd
          ls -la

          SETTINGS_FILE="$(find . -maxdepth 5 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1 || true)"

          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: Không tìm thấy settings.gradle hoặc settings.gradle.kts"
            echo "Bạn cần upload source project Android, không phải chỉ upload APK/ZIP."
            echo
            echo "===== ALL FILES ====="
            find . -maxdepth 6 -type f | sort
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          echo "Found settings file: $SETTINGS_FILE"
          echo "Project dir: $PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Show important project files
        shell: bash
        run: |
          set -e
          cd "${{ steps.locate.outputs.project_dir }}"

          echo "===== PROJECT DIR ====="
          pwd
          ls -la

          echo
          echo "===== GRADLE FILES ====="
          find . -maxdepth 6 \( \
            -name 'gradlew' -o \
            -name 'gradlew.bat' -o \
            -name 'build.gradle' -o \
            -name 'settings.gradle' -o \
            -name 'gradle-wrapper.properties' \
          \) -print | sort

          echo
          echo "===== JAVA FILES ====="
          find app/src -type f \( -name "*.java" -o -name "*.kt" -o -name "*.xml" \) -print | sort || true

          echo
          echo "===== AdbCommands.java ====="
          if [ -f app/src/main/java/com/khiconjk/rootadbenabler/AdbCommands.java ]; then
            sed -n '1,260p' app/src/main/java/com/khiconjk/rootadbenabler/AdbCommands.java
          else
            echo "AdbCommands.java not found"
            find app/src -type f -name "AdbCommands.java" -print
          fi

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          cd "${{ steps.locate.outputs.project_dir }}"

          rm -f build.log

          if [ -f "./gradlew" ]; then
            echo "Using local Gradle Wrapper: ./gradlew"
            chmod +x ./gradlew
            ./gradlew --version | tee -a build.log
            ./gradlew clean assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee -a build.log
          else
            echo "WARNING: ./gradlew not found" | tee -a build.log
            echo "Using GitHub Actions Gradle fallback 8.9" | tee -a build.log
            gradle --version | tee -a build.log
            gradle clean assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee -a build.log
          fi

      - name: Show real errors if build failed
        if: failure()
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}" || exit 0

          echo "===== BUILD LOG EXISTS? ====="
          ls -lh build.log || true

          echo
          echo "===== FAILED TASKS ====="
          grep -nE "> Task .*FAILED|FAILURE: Build failed|What went wrong|Execution failed|Caused by:|error:|ERROR:|cannot find symbol|not found|AAPT|Android resource linking failed|Manifest merger failed|compileDebugJavaWithJavac|parseDebugLocalResources|mergeDebugResources" build.log || true

          echo
          echo "===== CONTEXT AROUND FAILURE ====="
          awk '
            /FAILED|FAILURE:|What went wrong|Execution failed|Caused by:|error:|cannot find symbol|Android resource linking failed|Manifest merger failed/ {
              start=NR-25
              end=NR+80
              if (start < 1) start=1
              ranges[start]=end
            }
            { lines[NR]=$0 }
            END {
              for (s in ranges) {
                e=ranges[s]
                print "----- lines " s " to " e " -----"
                for (i=s; i<=e; i++) {
                  if (i in lines) print i ": " lines[i]
                }
              }
            }
          ' build.log || true

          echo
          echo "===== LAST 500 LINES ====="
          tail -n 500 build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            ${{ steps.locate.outputs.project_dir }}/build.log
          if-no-files-found: warn

      - name: List APK outputs
        if: always()
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}"

          echo "===== APK OUTPUTS ====="
          find . -type f -name "*.apk" -print -exec ls -lh {} \; || true

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RootAdbEnabler-debug-apk
          path: |
            ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.locate.outputs.project_dir }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
