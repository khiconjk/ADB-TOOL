name: Build Root ADB Enabler APK

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master
    paths:
      - "**/*.gradle"
      - "**/*.gradle.kts"
      - "**/settings.gradle"
      - "**/settings.gradle.kts"
      - "**/AndroidManifest.xml"
      - "**/src/**"
      - "**/app/**"
      - "**/gradle/**"
      - "**/gradlew"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle fallback 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Locate Android project
        id: locate
        shell: bash
        run: |
          set -e
          echo "===== REPO ROOT ====="
          pwd
          ls -la

          SETTINGS_FILE="$(find . -maxdepth 5 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1 || true)"
          if [ -z "$SETTINGS_FILE" ]; then
            echo "ERROR: Không tìm thấy settings.gradle hoặc settings.gradle.kts"
            find . -maxdepth 5 -type f | sort
            exit 1
          fi
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Found settings file: $SETTINGS_FILE"
          echo "Project dir: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Show project files
        shell: bash
        run: |
          set -e
          cd "${{ steps.locate.outputs.project_dir }}"
          echo "===== PROJECT DIR ====="
          pwd
          ls -la
          echo "===== GRADLE FILES ====="
          find . -maxdepth 5 \( -name 'gradlew' -o -name 'gradlew.bat' -o -name 'build.gradle' -o -name 'settings.gradle' -o -name 'gradle-wrapper.properties' \) -print | sort
          echo "===== APP FILES ====="
          find app -maxdepth 6 -type f | sort || true

      - name: Build debug APK
        shell: bash
        run: |
          set -e
          cd "${{ steps.locate.outputs.project_dir }}"
          if [ -f "./gradlew" ]; then
            echo "Using local Gradle Wrapper: ./gradlew"
            chmod +x ./gradlew
            ./gradlew --version
            ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          else
            echo "WARNING: ./gradlew not found"
            echo "Using GitHub Actions Gradle fallback 8.9"
            gradle --version
            gradle clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          fi

      - name: Show real errors if build failed
        if: failure()
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}" || exit 0
          echo "===== HIGH SIGNAL ERRORS ====="
          if [ -f build.log ]; then
            grep -nEi "error:|failed|failure|exception|cannot find|not found|denied|compile|lint|aapt|manifest|gradle|sdk|minSdk|targetSdk|namespace|kotlin" build.log | tail -n 300 || true
            echo
            echo "===== LAST 300 LINES ====="
            tail -n 300 build.log || true
          else
            echo "build.log not found"
          fi

      - name: List APK outputs
        if: always()
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}"
          echo "===== APK OUTPUTS ====="
          find . -type f -name "*.apk" -print -exec ls -lh {} \; || true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RootAdbEnabler-debug-apk
          path: |
            ${{ steps.locate.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
            ${{ steps.locate.outputs.project_dir }}/**/build/outputs/apk/debug/*.apk
          if-no-files-found: error
